name: release

on:
  push:
    tags:
      - '*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@v6
      - uses: sigstore/cosign-installer@v4.1.2
      - name: Install perl and cpm
        run: |
          curl -fsSL https://raw.githubusercontent.com/skaji/relocatable-perl/main/perl-install | bash -s $HOME/perl
          curl -fsSL https://raw.githubusercontent.com/skaji/cpm/main/cpm > $HOME/perl/bin/cpm
          chmod +x $HOME/perl/bin/cpm
          echo $HOME/perl/bin >> $GITHUB_PATH
      - uses: actions/cache@v5
        with:
          path: ~/.perl-cpm/builds
          key: ${{ runner.os }}
      - name: Install authoring tools
        run: cpm install -g Dist::Milla Dist::Zilla::Plugin::MetaProvides::Package Dist::Zilla::Plugin::Metadata https://github.com/skaji/perl-pause-upload.git
      - name: Prepare variables
        id: variable
        run: echo dist-tarball=$(jq -r .name META.json)-$(jq -r .version META.json).tar.gz >> $GITHUB_OUTPUT
      - name: Create artifacts
        run: dzil build
      - uses: actions/attest@v4
        id: attest
        with:
          subject-path: ${{ steps.variable.outputs.dist-tarball }}
      - name: Release
        run: |
          cp -f ${{ steps.attest.outputs.bundle-path }} ${{ steps.variable.outputs.dist-tarball }}.sigstore.json

          pause-upload \
            ${{ steps.variable.outputs.dist-tarball }} \
            ${{ steps.variable.outputs.dist-tarball }}.sigstore.json
          gh release create --repo ${{ github.repository }} ${{ github.ref }} \
            --notes ${{ steps.attest.outputs.attestation-url }} \
            ${{ steps.variable.outputs.dist-tarball }} \
            ${{ steps.variable.outputs.dist-tarball }}.sigstore.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAUSE_TOKEN: ${{ secrets.PAUSE_TOKEN }}
