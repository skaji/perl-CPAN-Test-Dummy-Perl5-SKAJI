name: release

on:
  push:
    tags:
      - '*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@v6
      - uses: sigstore/cosign-installer@v4.1.2
      - name: Install perl and cpm
        run: |
          curl -fsSL https://raw.githubusercontent.com/skaji/relocatable-perl/main/perl-install | bash -s $HOME/perl
          curl -fsSL https://raw.githubusercontent.com/skaji/cpm/main/cpm > $HOME/perl/bin/cpm
          curl -fsSL https://gist.githubusercontent.com/skaji/296c8dc62027b5c1b4ca389e5f3fdc53/raw/2ad86b48f12f6a0e2a4b4e193de624042a59b65c/pause-upload.pl > $HOME/perl/bin/pause-upload.pl
          chmod +x $HOME/perl/bin/cpm $HOME/perl/bin/pause-upload.pl
          echo $HOME/perl/bin >> $GITHUB_PATH
      - uses: actions/cache@v5
        with:
          path: ~/.perl-cpm/builds
          key: ${{ runner.os }}
      - name: Install authoring tools
        run: cpm install -g Dist::Milla Dist::Zilla::Plugin::MetaProvides::Package Dist::Zilla::Plugin::Metadata HTTP::Tiny::Multipart Path::Tiny
      - name: Prepare variables
        id: variable
        run: |
          echo dist_name=$(jq -r .name META.json) >> $GITHUB_OUTPUT
          echo dist_version=$(jq -r .version META.json) >> $GITHUB_OUTPUT
          echo dist_tarball=$(jq -r .name META.json)-$(jq -r .version META.json).tar.gz >> $GITHUB_OUTPUT
      - name: Create artifacts
        run: dzil build
      - uses: actions/attest@v4
        id: attest
        with:
          subject-path: ${{ steps.variable.outputs.dist_tarball }}
      - name: Release
        run: |
          cp -f ${{ steps.attest.outputs.bundle-path }} ${{ steps.variable.outputs.dist_tarball }}.sigstore.json

          pause-upload.pl ${{ steps.variable.outputs.dist_tarball }}
          pause-upload.pl ${{ steps.variable.outputs.dist_tarball }}.sigstore.json
          gh release create --repo ${{ github.repository }} ${{ github.ref }} \
            ${{ steps.variable.outputs.dist_tarball }} \
            ${{ steps.variable.outputs.dist_tarball }}.sigstore.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAUSE_TOKEN: ${{ secrets.PAUSE_TOKEN }}
